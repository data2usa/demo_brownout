      for (let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);

    }
    function pick(id, salt, arr) {
      return arr[(hashSeed(id) + salt) % arr.length];

      const [theme, setTheme] = useState('light');

      const C = THEMES[theme];
      const NODE_STYLE = useMemo(() => nodeStyles(C), [theme]);

      const svgRef = useRef(null);
      const zoomGroupRef = useRef(null);
      const simRef = useRef(null);
      const nodesRef = useRef([]);
      const edgesRef = useRef([]);
      const newNodeIdsRef = useRef(new Set());
      const newEdgeIdsRef = useRef(new Set());
      const zoomBehaviorRef = useRef(null);
      const [zoomLevel, setZoomLevel] = useState(1);
      const [selectedId, setSelectedId] = useState(null);

      useEffect(() => {
        const sim = d3.forceSimulation([])
          .force('link', d3.forceLink([]).id(d => d.id).distance(d => {
            if (d.kind === 'InterCubeLink') return 110;
            if (d.kind === 'CONTRIBUTES_TO') return 70;
            if (d.kind === 'OBSERVED_BY') return 55;
            if (d.kind === 'INCLUDES') return 90;
            if (d.kind === 'IN_ROUND') return 60;
            if (d.kind === 'CONTRIBUTED') return 75;
            return 85;
          }).strength(0.3))
          .force('charge', d3.forceManyBody().strength(d => {
            const s = NODE_STYLE[d.kind];
            return -((s?.r || 18) * 8);
          }))
          .force('collide', d3.forceCollide().radius(d => (NODE_STYLE[d.kind]?.r || 18) + 8))
          .alphaDecay(0.04)
          .velocityDecay(0.5)
          .on('tick', () => setTick(t => t + 1));

        simRef.current = sim;
        return () => sim.stop();
      }, []);

      useEffect(() => {
        const svg = svgRef.current;
        const zoomGroup = zoomGroupRef.current;
        if (!svg || !zoomGroup) return;

        const svgSel = d3.select(svg);
        const groupSel = d3.select(zoomGroup);

        const zoom = d3.zoom()
          .scaleExtent([0.3, 3])
          .filter((event) => {
            if (event.type === 'wheel') return true;
            if (event.button) return false;
            return true;
          })
          .on('zoom', (event) => {
            groupSel.attr('transform', event.transform.toString());
            setZoomLevel(event.transform.k);
          });

        zoomBehaviorRef.current = zoom;
        svgSel.call(zoom);
        svgSel.on('dblclick.zoom', null);

        return () => { svgSel.on('.zoom', null); };
      }, []);

      useEffect(() => {
        const zoomGroup = zoomGroupRef.current;
        if (!zoomGroup) return;

        let dragStartXY = null;
        let didMove = false;

        const drag = d3.drag()
          .on('start', function(event) {
            const id = this.getAttribute('data-id');
            const d = nodesRef.current.find(n => n.id === id);
            if (!d) return;
            dragStartXY = [event.x, event.y];
            didMove = false;
            if (!event.active) simRef.current?.alphaTarget(0.3).restart();
          })
          .on('drag', function(event) {
            const id = this.getAttribute('data-id');
            const d = nodesRef.current.find(n => n.id === id);
            if (!d) return;
            if (!didMove && dragStartXY) {
              const dx = event.x - dragStartXY[0];
              const dy = event.y - dragStartXY[1];
              if (Math.hypot(dx, dy) > 3) {
                didMove = true;
                d.fx = d.x;
                d.fy = d.y;
              }
            }
            if (didMove) {
              d.fx = Math.max(40, Math.min(VIEW_W - 40, event.x));
              d.fy = Math.max(40, Math.min(VIEW_H - 40, event.y));
            }
          })
          .on('end', function(event) {
            if (!event.active) simRef.current?.alphaTarget(0);
            const id = this.getAttribute('data-id');
            if (!didMove) {
              setSelectedId(prev => prev === id ? null : id);
            }
            dragStartXY = null;
          });

        d3.select(zoomGroup).selectAll('g.node-group').call(drag);
      });

      const handleNodeDoubleClick = (e, node) => {
        e.stopPropagation();
        node.fx = null;
        node.fy = null;
        simRef.current?.alpha(0.4).restart();
      };

      const zoomBy = (factor) => {
        if (!svgRef.current || !zoomBehaviorRef.current) return;
        d3.select(svgRef.current).transition().duration(220)
          .call(zoomBehaviorRef.current.scaleBy, factor);
      };
      const resetZoom = () => {
        if (!svgRef.current || !zoomBehaviorRef.current) return;
        d3.select(svgRef.current).transition().duration(300)
          .call(zoomBehaviorRef.current.transform, d3.zoomIdentity);
      };

      useEffect(() => {
        if (!simRef.current) return;

        const wantedNodes = new Map();
        const wantedEdges = new Map();
        const newNodeIds = new Set();
        const newEdgeIds = new Set();

        for (let i = 0; i <= beatIdx; i++) {
          const b = BEATS[i];
          (b.addNodes || []).forEach(n => {
            wantedNodes.set(n.id, { ...n, beatIntroduced: i });
            if (i === beatIdx) newNodeIds.add(n.id);
          });
          (b.addEdges || []).forEach(e => {
            wantedEdges.set(e.id, { ...e, beatIntroduced: i });
            if (i === beatIdx) newEdgeIds.add(e.id);
          });
        }

        const existingById = new Map(nodesRef.current.map(n => [n.id, n]));
        const merged = [];
        wantedNodes.forEach((wantedNode, id) => {
          let pinX = null, pinY = null;
          if (wantedNode.placeId && PLACES[wantedNode.placeId]) {
            pinX = PLACES[wantedNode.placeId].x;
            pinY = PLACES[wantedNode.placeId].y;
          } else if (wantedNode.lanePos && LANE_POS[wantedNode.lanePos]) {
            pinX = LANE_POS[wantedNode.lanePos].x;
            pinY = LANE_POS[wantedNode.lanePos].y;
          }

          const existing = existingById.get(id);
          if (existing) {
            const wasUserDragged = existing.fx != null && (
              (PLACES[existing.placeId] && (Math.abs(existing.fx - PLACES[existing.placeId].x) > 1 || Math.abs(existing.fy - PLACES[existing.placeId].y) > 1)) ||
              (LANE_POS[existing.lanePos] && (Math.abs(existing.fx - LANE_POS[existing.lanePos].x) > 1 || Math.abs(existing.fy - LANE_POS[existing.lanePos].y) > 1))
            );
            Object.assign(existing, { ...wantedNode, x: existing.x, y: existing.y, vx: existing.vx, vy: existing.vy });
            if (!wasUserDragged && pinX != null) {
              existing.fx = pinX;
              existing.fy = pinY;
            }
            merged.push(existing);
          } else {
            let seedX = pinX != null ? pinX : (LANE_X + 100 + (Math.random() - 0.5) * 60);
            let seedY = pinY != null ? pinY : (VIEW_H / 2 + (Math.random() - 0.5) * 60);
            const newNode = { ...wantedNode, x: seedX, y: seedY };
            if (pinX != null) { newNode.fx = pinX; newNode.fy = pinY; }
            merged.push(newNode);
          }
        });

        nodesRef.current = merged;
        edgesRef.current = [...wantedEdges.values()];
        newNodeIdsRef.current = newNodeIds;
        newEdgeIdsRef.current = newEdgeIds;

        simRef.current.nodes(nodesRef.current);
        simRef.current.force('link').links(edgesRef.current);
        simRef.current.alpha(0.9).restart();
      }, [beatIdx]);

      useEffect(() => {
        if (!autoPlay) return;
        if (beatIdx >= BEATS.length - 1) { setAutoPlay(false); return; }
        const t = setTimeout(() => setBeatIdx(i => i + 1), 3000);
        return () => clearTimeout(t);
      }, [autoPlay, beatIdx]);

      const nodes = nodesRef.current;
      const edges = edgesRef.current;
      for (const n of nodes) {
        if (n.x != null) {
          n.x = Math.max(40, Math.min(VIEW_W - 40, n.x));
          n.y = Math.max(40, Math.min(VIEW_H - 40, n.y));
        }
      }

      const currentBeat = BEATS[beatIdx];

      const auditSet = useMemo(() => {
        if (!showAuditOnly) return null;
        for (let i = beatIdx; i >= 0; i--) {
          if (BEATS[i].auditChain) return new Set(BEATS[i].auditChain);
        }
        return null;
      }, [beatIdx, showAuditOnly]);

      const isVisible = (id) => !auditSet || auditSet.has(id);

      const counts = useMemo(() => {
        const c = {};
        for (const n of nodes) c[n.kind] = (c[n.kind] || 0) + 1;
        for (const e of edges) c[e.kind] = (c[e.kind] || 0) + 1;
        return c;
      }, [beatIdx, nodes.length, edges.length]);

      const selectedNode = selectedId ? nodes.find(n => n.id === selectedId) : null;
      const selectedConnections = useMemo(() => {
        if (!selectedNode) return [];
        const out = [];
        for (const e of edges) {
          const sId = typeof e.source === 'object' ? e.source.id : e.source;
          const tId = typeof e.target === 'object' ? e.target.id : e.target;
          if (sId === selectedNode.id) {
            const other = nodes.find(n => n.id === tId);
            if (other) out.push({ kind: e.kind, direction: 'out', other });
          } else if (tId === selectedNode.id) {
            const other = nodes.find(n => n.id === sId);
            if (other) out.push({ kind: e.kind, direction: 'in', other });
          }
        }
        return out;
      }, [selectedId, beatIdx, edges.length, nodes.length]);

      return (
        <div style={{
          minHeight: '100vh',
          background: C.bg,
          color: C.text,
          fontFamily: '"Fraunces", Georgia, serif',
          padding: '24px',
          boxSizing: 'border-box',
        }}>
          <style>{`
            @keyframes pulseRing {
              0%, 100% { opacity: 0.7; r: var(--rBase); }
              50% { opacity: 0.15; r: calc(var(--rBase) + 14px); }
            }
            @keyframes auditGlow {
              0%, 100% { filter: drop-shadow(0 0 2px ${C.gold}); }
              50%      { filter: drop-shadow(0 0 9px ${C.gold}); }
            }
            .grid-bg {
              background-image:
                linear-gradient(${C.gridLine} 1px, transparent 1px),
                linear-gradient(90deg, ${C.gridLine} 1px, transparent 1px);
              background-size: 32px 32px;
            }
            .mono { font-family: 'JetBrains Mono', monospace; }
            button { font-family: inherit; cursor: pointer; transition: all 0.15s ease; }
            button:disabled { cursor: not-allowed; opacity: 0.4; }
          `}</style>

          <header style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'flex-end',
            borderBottom: `1px solid ${C.border}`,
            paddingBottom: '16px',
            marginBottom: '20px',
          }}>
            <div>
              <div className="mono" style={{
                fontSize: '11px', color: C.textDim, letterSpacing: '0.2em', marginBottom: '4px',
              }}>
                NECL · SCENARIO EXPLORER · v0.8 · MAP + DECISION LANE
              </div>
              <h1 style={{ margin: 0, fontSize: '32px', fontWeight: 500, letterSpacing: '-0.02em' }}>
                The Brownout
              </h1>

            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '10px' }}>
              <button
                onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
                className="mono"
                title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
                style={{
                  background: 'transparent', color: C.textMuted,
                  border: `1px solid ${C.border}`, padding: '6px 10px',
                  fontSize: '10px', fontWeight: 500, letterSpacing: '0.15em', borderRadius: '3px',
                }}
              >
                {theme === 'dark' ? '☼ LIGHT' : '☾ DARK'}
              </button>
              <div className="mono" style={{ fontSize: '11px', color: C.textDim, textAlign: 'right' }}>
                BEAT {beatIdx.toString().padStart(2, '0')} / {(BEATS.length - 1).toString().padStart(2, '0')}<br />
                NODES {nodes.length.toString().padStart(2, '0')} · EDGES {edges.length.toString().padStart(2, '0')}
              </div>
            </div>
          </header>

          <div style={{
            display: 'grid',
            gridTemplateColumns: '1fr 320px',
            gap: '20px',
            height: 'calc(100vh - 240px)',
            minHeight: '720px',
          }}>
            {/* Graph canvas */}
            <div style={{
              background: C.bgPanel, border: `1px solid ${C.border}`,
              borderRadius: '4px', position: 'relative', overflow: 'hidden',
            }}>
              <div className="grid-bg" style={{ position: 'absolute', inset: 0, opacity: theme === 'dark' ? 0.18 : 0.25, pointerEvents: 'none' }} />
              <div className="mono" style={{
                position: 'absolute', top: '12px', left: '14px',
                fontSize: '10px', color: C.textDim, letterSpacing: '0.15em', zIndex: 2, pointerEvents: 'none',
              }}>
                REGION · WESTERN INTERCONNECT · ZONE 4
              </div>
              <div className="mono" style={{
                position: 'absolute', top: '12px', right: '14px',
                fontSize: '10px', color: showAuditOnly ? C.gold : C.textDim,
                letterSpacing: '0.15em', zIndex: 2, pointerEvents: 'none',
              }}>
                {showAuditOnly ? 'AUDIT TRAVERSAL' : 'FULL GRAPH'}
              </div>

              {/* Zoom controls */}
              <div style={{
                position: 'absolute', bottom: '14px', right: '14px', zIndex: 2,
                display: 'flex', flexDirection: 'column', gap: '4px',
                background: C.bgSubtle, border: `1px solid ${C.border}`,
                borderRadius: '4px', padding: '4px',
              }}>
                <button onClick={() => zoomBy(1.3)} className="mono" title="Zoom in" style={zoomBtnStyle(C)}>+</button>
                <button onClick={() => zoomBy(1 / 1.3)} className="mono" title="Zoom out" style={zoomBtnStyle(C)}>−</button>
                <button onClick={resetZoom} className="mono" title="Reset view" style={{ ...zoomBtnStyle(C), fontSize: '10px' }}>⊙</button>
                <div className="mono" style={{ textAlign: 'center', fontSize: '9px', color: C.textDim, padding: '2px 0', letterSpacing: '0.05em' }}>
                  {Math.round(zoomLevel * 100)}%
                </div>
              </div>

              <div className="mono" style={{
                position: 'absolute', bottom: '14px', left: '14px', zIndex: 2,
                fontSize: '9px', color: C.textDim, letterSpacing: '0.1em',
                lineHeight: 1.5, pointerEvents: 'none',
              }}>
                CLICK NODE TO INSPECT · DRAG TO PIN · DBL-CLICK TO RELEASE<br />
                SCROLL TO ZOOM · DRAG BG TO PAN
              </div>

              <svg
                ref={svgRef}
                viewBox={`0 0 ${VIEW_W} ${VIEW_H}`}
                preserveAspectRatio="xMidYMid meet"
                style={{ width: '100%', height: '100%', display: 'block' }}
              >
                <defs>
                  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill={C.borderHi} />
                  </marker>
                  <marker id="arrow-audit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill={C.gold} />
                  </marker>
                  <clipPath id="mapClip">
                    <rect x={MAP_BOUNDS.x - 10} y={MAP_BOUNDS.y - 10} width={MAP_BOUNDS.w + 20} height={MAP_BOUNDS.h + 20} rx="3" />
                  </clipPath>
                </defs>

                <g ref={zoomGroupRef}>
                  <rect className="zoom-bg" x={-2000} y={-2000} width={VIEW_W + 4000} height={VIEW_H + 4000} fill="transparent" />

                  {/* Map background — OSM tiles centered on Calgary (51.0447°N, 114.0719°W), zoom 11 */}
                  {/* Tile grid: x 373-376, y 684-686. Calgary center lands at pixel (504, 358) in the grid, */}
                  {/* which maps to SVG (470, 360) — the centre of MAP_BOUNDS. Grid origin: SVG (-34, 2).   */}
                  <g clipPath="url(#mapClip)" style={{ pointerEvents: 'none' }}>
                    {[373, 374, 375, 376].flatMap((tx, xi) =>
                      [684, 685, 686].map((ty, yi) => (
                        <image
                          key={`tile-${tx}-${ty}`}
                          href={`https://tile.openstreetmap.org/11/${tx}/${ty}.png`}
                          x={-34 + xi * 256}
                          y={2 + yi * 256}
                          width={256}
                          height={256}
                        />
                      ))
                    )}
                    {/* Theme tint — heavier in dark mode to keep schematic readable */}
                    <rect x={MAP_BOUNDS.x - 10} y={MAP_BOUNDS.y - 10} width={MAP_BOUNDS.w + 20} height={MAP_BOUNDS.h + 20}
                      fill={C.mapBg} opacity={theme === 'dark' ? 0.55 : 0.08} />
                  </g>
                  <rect x={MAP_BOUNDS.x - 10} y={MAP_BOUNDS.y - 10} width={MAP_BOUNDS.w + 20} height={MAP_BOUNDS.h + 20}
                    fill="none" stroke={C.border} strokeWidth="1" rx="3" style={{ pointerEvents: 'none' }} />

                  {/* Decision lane */}
                  <rect x={LANE_X} y={MAP_BOUNDS.y - 10} width={VIEW_W - LANE_X - 30} height={MAP_BOUNDS.h + 20}
                    fill={C.laneBg} stroke={C.border} strokeWidth="1" rx="3" style={{ pointerEvents: 'none' }} />

                  {/* Labels */}
                  <g style={{ pointerEvents: 'none' }}>
                    <text x={MAP_BOUNDS.x} y={MAP_BOUNDS.y - 18} fill={C.textDim} fontSize="10" fontFamily="JetBrains Mono, monospace" letterSpacing="0.2em">REGIONAL GRID · CALGARY · SCHEMATIC</text>
                    <text x={LANE_X + 10} y={MAP_BOUNDS.y - 18} fill={C.textDim} fontSize="10" fontFamily="JetBrains Mono, monospace" letterSpacing="0.2em">DECISION LANE</text>
                    <text x={MAP_BOUNDS.x + MAP_BOUNDS.w - 2} y={MAP_BOUNDS.y + MAP_BOUNDS.h + 15} textAnchor="end" fill={C.textDim} fontSize="8" fontFamily="JetBrains Mono, monospace" opacity="0.6">© OpenStreetMap contributors</text>
                  </g>

                  {/* Data Center landmark */}
                  <g style={{ pointerEvents: 'none' }}>
                    <rect x={PLACES.dataCenter.x - 28} y={PLACES.dataCenter.y - 18} width={56} height={36} fill={C.warnDim} stroke={C.dataCenter} strokeWidth="1.5" rx="2" />
                    <line x1={PLACES.dataCenter.x - 18} y1={PLACES.dataCenter.y - 8} x2={PLACES.dataCenter.x + 18} y2={PLACES.dataCenter.y - 8} stroke={C.dataCenter} strokeWidth="1" opacity="0.7" />
                    <line x1={PLACES.dataCenter.x - 18} y1={PLACES.dataCenter.y} x2={PLACES.dataCenter.x + 18} y2={PLACES.dataCenter.y} stroke={C.dataCenter} strokeWidth="1" opacity="0.7" />
                    <line x1={PLACES.dataCenter.x - 18} y1={PLACES.dataCenter.y + 8} x2={PLACES.dataCenter.x + 18} y2={PLACES.dataCenter.y + 8} stroke={C.dataCenter} strokeWidth="1" opacity="0.7" />
                    <text x={PLACES.dataCenter.x} y={PLACES.dataCenter.y + 32} textAnchor="middle" fill={C.dataCenter} fontSize="9.5" fontFamily="JetBrains Mono, monospace" letterSpacing="0.1em" fontWeight="600">DATA CENTER · SITE Z</text>
                  </g>

                  {/* Disturbance zone halo */}
                  {nodes.find(n => n.id === 'z1') && (() => {
                    const members = ['c2', 'c3', 'c4'].map(id => nodes.find(n => n.id === id)).filter(Boolean);
                    if (members.length === 0) return null;
                    const cx = members.reduce((s, n) => s + n.x, 0) / members.length;
                    const cy = members.reduce((s, n) => s + n.y, 0) / members.length;
                    const maxDist = Math.max(...members.map(n => Math.hypot(n.x - cx, n.y - cy)));
                    return (
                      <g style={{ pointerEvents: 'none' }}>
                        <circle cx={cx} cy={cy} r={maxDist + 50} fill={C.warn} opacity="0.08" />
                        <circle cx={cx} cy={cy} r={maxDist + 50} fill="none" stroke={C.warn} strokeWidth="1.2" strokeDasharray="6 4" opacity="0.55" />
                        <text x={cx} y={cy + maxDist + 68} textAnchor="middle" fill={C.warn} fontSize="9.5" fontFamily="JetBrains Mono, monospace" letterSpacing="0.15em" fontWeight="600">DISTURBANCE ZONE · zone-001</text>
                      </g>
                    );
                  })()}

                  {/* Edges */}
                  {edges.map(e => {
                    const s = typeof e.source === 'object' ? e.source : nodes.find(n => n.id === e.source);
                    const t = typeof e.target === 'object' ? e.target : nodes.find(n => n.id === e.target);
                    if (!s || !t || s.x == null || t.x == null) return null;
                    if (!isVisible(e.id) || !isVisible(s.id) || !isVisible(t.id)) return null;

                    const sStyle = NODE_STYLE[s.kind] || NODE_STYLE.DataCube;
                    const tStyle = NODE_STYLE[t.kind] || NODE_STYLE.DataCube;
                    const dx = t.x - s.x, dy = t.y - s.y;
                    const len = Math.hypot(dx, dy) || 1;
                    const ux = dx / len, uy = dy / len;
                    const x1 = s.x + ux * (sStyle.r + 1);
                    const y1 = s.y + uy * (sStyle.r + 1);
                    const x2 = t.x - ux * (tStyle.r + 3);
                    const y2 = t.y - uy * (tStyle.r + 3);

                    const isInfra = e.kind === 'InterCubeLink';
                    const inAudit = auditSet && auditSet.has(e.id);
                    const isNew = newEdgeIdsRef.current.has(e.id);
                    const stroke = inAudit ? C.gold : (isInfra ? C.transmission : C.borderHi);
                    const strokeWidth = inAudit ? 2.4 : (isInfra ? 2.2 : 1.4);
                    const opacity = inAudit ? 1 : (isInfra ? 0.85 : 0.75);

                    return (
                      <g key={e.id} style={inAudit ? { animation: 'auditGlow 2s ease-in-out infinite' } : {}}>
                        {isInfra && <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={C.transmission} strokeWidth={5} opacity={0.18} />}
                        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={stroke} strokeWidth={strokeWidth} opacity={opacity}
                          markerEnd={isInfra ? undefined : (inAudit ? 'url(#arrow-audit)' : 'url(#arrow)')} />
                        {isNew && !isInfra && (
                          <text x={(x1 + x2) / 2} y={(y1 + y2) / 2 - 5} textAnchor="middle" fill={C.textMuted} fontSize="9" fontFamily="JetBrains Mono, monospace" letterSpacing="0.05em" style={{ pointerEvents: 'none' }}>
                            {e.kind}
                          </text>
                        )}
                      </g>
                    );
                  })}

                  {/* Nodes */}
                  {nodes.map(n => {
                    if (!isVisible(n.id)) return null;
                    if (n.x == null) return null;
                    const style = NODE_STYLE[n.kind] || NODE_STYLE.DataCube;
                    const inAudit = auditSet && auditSet.has(n.id);
                    const isPulse = n.pulse;
                    const isPinned = n.fx != null;
                    const isSelected = selectedId === n.id;

                    return (
                      <g key={n.id} className="node-group" data-id={n.id}
                        transform={`translate(${n.x},${n.y})`}
                        style={{ cursor: 'grab', touchAction: 'none' }}
                        onDoubleClick={(e) => handleNodeDoubleClick(e, n)}
                      >
                        {isSelected && <circle cx={0} cy={0} r={style.r + 8} fill="none" stroke={C.text} strokeWidth="1.8" strokeDasharray="3 3" opacity="0.9" style={{ pointerEvents: 'none' }} />}
                        {isPulse && (
                          <circle cx={0} cy={0} r={style.r + 6} fill="none"
                            stroke={n.kind === 'Disturbance' ? C.warn : C.accent} strokeWidth="1.4"
                            style={{ '--rBase': `${style.r + 6}px`, animation: 'pulseRing 1.6s ease-in-out infinite', transformOrigin: 'center', pointerEvents: 'none' }} />
                        )}
                        <circle cx={0} cy={0} r={style.r} fill={style.fill}
                          stroke={inAudit ? C.gold : style.stroke} strokeWidth={inAudit ? 2.5 : 1.5}
                          style={inAudit ? { animation: 'auditGlow 2s ease-in-out infinite' } : {}} />
                        {isPinned && (
                          <circle cx={style.r * 0.7} cy={-style.r * 0.7} r={3.5} fill={C.accent} stroke={C.bgPanel} strokeWidth={1.2} style={{ pointerEvents: 'none' }}>
                            <title>Pinned — double-click to release</title>
                          </circle>
                        )}
                        <text x={0} y={4} textAnchor="middle" fill={style.stroke} fontSize={style.r * 0.9} fontFamily="JetBrains Mono, monospace" style={{ pointerEvents: 'none' }}>
                          {style.glyph}
                        </text>
                        <text x={0} y={style.r + 14} textAnchor="middle" fill={C.textMuted} fontSize="10" fontFamily="JetBrains Mono, monospace" letterSpacing="0.05em" style={{ pointerEvents: 'none' }}>
                          {n.label}
                        </text>
                        {n.kind === 'DataCube' && PLACES[n.placeId]?.name && (
                          <text x={0} y={style.r + 26} textAnchor="middle" fill={C.textDim} fontSize="9" fontFamily="JetBrains Mono, monospace" letterSpacing="0.03em" style={{ pointerEvents: 'none' }}>
                            {PLACES[n.placeId].name}
                          </text>
                        )}
                        {n.kind !== 'DataCube' && (
                          <text x={0} y={style.r + 26} textAnchor="middle" fill={C.textDim} fontSize="9" fontFamily="JetBrains Mono, monospace" letterSpacing="0.05em" style={{ pointerEvents: 'none' }}>
                            :{n.kind}
                          </text>
                        )}
                      </g>
                    );
                  })}
                </g>
              </svg>
            </div>

            {/* Side panel */}
            <div style={{
              background: C.bgPanel, border: `1px solid ${C.border}`,
              borderRadius: '4px', padding: '20px',
              display: 'flex', flexDirection: 'column', gap: '20px', overflowY: 'auto',
            }}>
              {selectedNode ? (
                <NodeInspector
                  node={selectedNode}
                  connections={selectedConnections}
                  meta={KIND_META[selectedNode.kind]}
                  style={NODE_STYLE[selectedNode.kind]}
                  C={C}
                  onClose={() => setSelectedId(null)}
                />
              ) : (
                <>
                  <div>
                    <div className="mono" style={{ fontSize: '10px', color: C.accent, letterSpacing: '0.2em', marginBottom: '6px' }}>
                      BEAT {beatIdx.toString().padStart(2, '0')}
                    </div>
                    <div style={{ fontSize: '22px', fontWeight: 600, lineHeight: 1.2, marginBottom: '6px' }}>
                      {currentBeat.title}
                    </div>
                    <div style={{ fontStyle: 'italic', color: C.textMuted, fontSize: '14px', lineHeight: 1.45 }}>
                      {currentBeat.subtitle}
                    </div>
                  </div>

                  <div style={{ background: C.bgSubtle, border: `1px solid ${C.border}`, borderRadius: '3px', padding: '14px' }}>
                    <div className="mono" style={{ fontSize: '9px', color: C.textDim, letterSpacing: '0.2em', marginBottom: '8px' }}>OPERATOR CONSOLE</div>
                    <div className="mono" style={{ fontSize: '11.5px', color: C.text, lineHeight: 1.55 }}>{currentBeat.operatorView}</div>
                  </div>

                  {currentBeat.narrative && (
                    <div style={{ borderLeft: `2px solid ${C.accent}`, paddingLeft: '12px', fontSize: '13px', color: C.textMuted, fontStyle: 'italic', lineHeight: 1.5 }}>
                      {currentBeat.narrative}
                    </div>
                  )}

                  <div>
                    <div className="mono" style={{ fontSize: '9px', color: C.textDim, letterSpacing: '0.2em', marginBottom: '8px' }}>GRAPH STATE</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                      {Object.entries(counts).sort().map(([kind, n]) => (
                        <div key={kind} className="mono" style={{
                          display: 'flex', justifyContent: 'space-between',
                          fontSize: '11px', padding: '4px 0', borderBottom: `1px dashed ${C.border}`,
                        }}>
                          <span style={{ color: NODE_STYLE[kind]?.stroke || C.textMuted }}>:{kind}</span>
                          <span style={{ color: C.text }}>{n}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="mono" style={{ fontSize: '10px', color: C.textDim, letterSpacing: '0.05em', lineHeight: 1.5, paddingTop: '4px', borderTop: `1px dashed ${C.border}` }}>
                    ⓘ Click any node to inspect its properties.
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Controls */}
          <div style={{ marginTop: '20px', display: 'flex', gap: '12px', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', gap: '10px' }}>
              <button onClick={() => { setBeatIdx(0); setAutoPlay(false); setShowAuditOnly(false); nodesRef.current = []; edgesRef.current = []; }} style={btnStyle(C)}>⟲ RESET</button>
              <button onClick={() => setBeatIdx(i => Math.max(0, i - 1))} disabled={beatIdx === 0} style={btnStyle(C)}>◀ BACK</button>
              <button onClick={() => setBeatIdx(i => Math.min(BEATS.length - 1, i + 1))} disabled={beatIdx === BEATS.length - 1} style={btnStyle(C, { accent: true })}>NEXT BEAT ▶</button>
              <button onClick={() => setAutoPlay(p => !p)} disabled={beatIdx === BEATS.length - 1 && !autoPlay} style={btnStyle(C)}>{autoPlay ? '❚❚ PAUSE' : '▶ AUTOPLAY'}</button>
            </div>
            <div>
              <button onClick={() => setShowAuditOnly(s => !s)} disabled={beatIdx < BEATS.length - 1} style={btnStyle(C, { gold: showAuditOnly })}>
                {showAuditOnly ? '◉ AUDIT CHAIN ON' : '○ SHOW AUDIT CHAIN'}
              </button>
            </div>
          </div>

          {/* Beat strip */}
          <div style={{ marginTop: '16px', display: 'flex', gap: '4px', height: '6px' }}>
            {BEATS.map((b, i) => (
              <div key={i} onClick={() => setBeatIdx(i)} title={b.title}
                style={{
                  flex: 1, background: i <= beatIdx ? C.accent : C.border,
                  opacity: i === beatIdx ? 1 : (i < beatIdx ? 0.55 : 0.3),
                  cursor: 'pointer', borderRadius: '2px', transition: 'all 0.2s ease',
                }}
              />
            ))}
          </div>

          <div className="mono" style={{ marginTop: '14px', fontSize: '10px', color: C.textDim, letterSpacing: '0.1em', textAlign: 'center' }}>
            STAGE NOT THE PLAY · KERNEL WORDS BUILDING THEMSELVES
          </div>
        </div>
      );
    }

    function NodeInspector({ node, connections, meta, style, C, onClose }) {
      const props = meta?.props ? meta.props(node) : [['id', node.id], ['label', node.label]];

      return (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1, minWidth: 0 }}>
              <div style={{
                width: '44px', height: '44px', borderRadius: '50%',
                background: style?.fill || C.bgSubtle, border: `1.5px solid ${style?.stroke || C.border}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: style?.stroke || C.text, fontFamily: 'JetBrains Mono, monospace',
                fontSize: '20px', flexShrink: 0,
              }}>
                {style?.glyph || '○'}
              </div>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div className="mono" style={{ fontSize: '10px', color: C.accent, letterSpacing: '0.2em', marginBottom: '4px' }}>NODE INSPECTOR</div>
                <div className="mono" style={{ fontSize: '15px', fontWeight: 600, color: style?.stroke || C.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  :{node.kind}
                </div>
              </div>
            </div>
            <button onClick={onClose} aria-label="Close inspector" className="mono"
              style={{ background: 'transparent', color: C.textMuted, border: `1px solid ${C.border}`, borderRadius: '3px', width: '24px', height: '24px', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0, cursor: 'pointer', flexShrink: 0 }}>
              ×
            </button>
          </div>

          {meta && (
            <>
              <div style={{ background: C.bgSubtle, border: `1px solid ${C.border}`, borderRadius: '3px', padding: '14px' }}>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '10px', flexWrap: 'wrap' }}>
                  <div className="mono" style={{ fontSize: '9px', letterSpacing: '0.15em', color: meta.kernel === 'load-bearing' ? C.accent : C.warn, border: `1px solid ${meta.kernel === 'load-bearing' ? C.accent : C.warn}`, padding: '2px 6px', borderRadius: '2px' }}>
                    {meta.kernel === 'load-bearing' ? 'KERNEL · LOAD-BEARING' : 'MISSION-SPECIFIC'}
                  </div>
                  <div className="mono" style={{ fontSize: '9px', letterSpacing: '0.15em', color: C.warn, border: `1px solid ${C.warn}`, padding: '2px 6px', borderRadius: '2px' }}>
                    MISSION · BROWNOUT
                  </div>
                </div>
                <div style={{ fontSize: '13px', color: C.text, lineHeight: 1.5 }}>{meta.inMission}</div>
              </div>
              {meta.kernelNote && (
                <div style={{ borderLeft: `2px solid ${C.accent}`, paddingLeft: '12px', fontSize: '12px', color: C.textMuted, fontStyle: 'italic', lineHeight: 1.5 }}>
                  <div className="mono" style={{ fontSize: '9px', color: C.accent, letterSpacing: '0.15em', marginBottom: '4px', fontStyle: 'normal' }}>IN THE KERNEL</div>
                  {meta.kernelNote}
                </div>
              )}
            </>
          )}

          <div>
            <div className="mono" style={{ fontSize: '9px', color: C.textDim, letterSpacing: '0.2em', marginBottom: '8px' }}>PROPERTIES</div>
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              {props.map(([k, v]) => (
                <div key={k} className="mono" style={{ display: 'grid', gridTemplateColumns: '110px 1fr', gap: '10px', fontSize: '11px', padding: '6px 0', borderBottom: `1px dashed ${C.border}` }}>
                  <span style={{ color: C.textMuted }}>{k}</span>
                  <span style={{ color: C.text, wordBreak: 'break-word' }}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          <div>
            <div className="mono" style={{ fontSize: '9px', color: C.textDim, letterSpacing: '0.2em', marginBottom: '8px' }}>CONNECTIONS · {connections.length}</div>
            {connections.length === 0 ? (
              <div className="mono" style={{ fontSize: '11px', color: C.textDim, fontStyle: 'italic' }}>No connections in current graph state.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                {connections.map((c, i) => (
                  <div key={i} className="mono" style={{ fontSize: '10.5px', padding: '6px 8px', background: C.bgSubtle, border: `1px solid ${C.border}`, borderRadius: '2px', lineHeight: 1.4 }}>
                    <span style={{ color: C.textDim }}>{c.direction === 'out' ? '→' : '←'}</span>
                    {' '}<span style={{ color: C.cyan }}>:{c.kind}</span>
                    {' '}<span style={{ color: C.textDim }}>→</span>
                    {' '}<span style={{ color: C.text }}>{c.other.label}</span>
                    {' '}<span style={{ color: C.textMuted }}>:{c.other.kind}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="mono" style={{ fontSize: '10px', color: C.textDim, letterSpacing: '0.05em', lineHeight: 1.5, paddingTop: '4px', borderTop: `1px dashed ${C.border}` }}>
            ⓘ Click another node to inspect, or × to return to beat view.
          </div>
        </>
      );
    }

    function btnStyle(C, { accent = false, gold = false } = {}) {
      return {
        background: gold ? C.gold : (accent ? C.accent : 'transparent'),
        color: gold ? C.bg : (accent ? C.bg : C.text),
        border: `1px solid ${gold ? C.gold : (accent ? C.accent : C.border)}`,
        padding: '9px 14px', fontSize: '11px',
        fontFamily: 'JetBrains Mono, monospace',
        fontWeight: 500, letterSpacing: '0.1em', borderRadius: '3px',
      };
    }

    function zoomBtnStyle(C) {
      return {
        background: 'transparent', color: C.text,
        border: `1px solid ${C.border}`,
        width: '28px', height: '28px', fontSize: '14px',
        fontFamily: 'JetBrains Mono, monospace',
        fontWeight: 500, borderRadius: '3px',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 0, lineHeight: 1,
      };
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NECLExplorer />);
  </script>
</body>
</html>
